name: release-editor-react

# On a version tag (v*), build @transon/editor-react and attach an `npm pack` tarball to the GitHub
# release for that tag. The docs-site (transon-org.github.io) consumes this release asset in
# production (RFC-005 Part 4) — a registry-free, reproducible, versioned distribution, since the
# package is a subdir of a pnpm workspace and cannot be `git+https`-installed directly.

on:
  push:
    tags:
      - "v*"

# One release run per tag; a quick re-push supersedes the in-flight run rather than double-releasing.
concurrency:
  group: release-editor-react-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pack:
    name: Pack and attach to release
    runs-on: ubuntu-latest
    permissions:
      contents: write # scoped to this job: create / attach the release asset
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0 — pnpm version from package.json "packageManager"

      # No `cache: pnpm` here: --frozen-lockfile already makes the install deterministic, and the
      # v4.3.0 cache-restore layer is a known flake source not worth it for a rare release run.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      # Turbo builds the internal chain first (editor-core → editor-blockly → editor-ui →
      # editor-react); editor-react bundles those into its dist (only react + blockly stay external).
      - name: Build @transon/editor-react
        run: pnpm turbo run build --filter=@transon/editor-react

      - name: Pack tarball
        id: pack
        working-directory: packages/editor-react
        run: |
          FILE=$(npm pack --silent)
          echo "file=packages/editor-react/$FILE" >> "$GITHUB_OUTPUT"

      # Create the release for this tag (or upload to it if it already exists) and attach the tarball.
      # The tarball path travels via an env var so it is treated as data, not shell-injected script.
      - name: Attach tarball to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARBALL: ${{ steps.pack.outputs.file }}
        run: |
          gh release create "$GITHUB_REF_NAME" "$TARBALL" \
            --title "$GITHUB_REF_NAME" --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" "$TARBALL" --clobber
