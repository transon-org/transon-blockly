name: agentic-checks

# Turns the repo's deterministic gates from advisory into binding: every PR and
# every push to main must pass the same checks an agent is told to run. This is
# the "deterministic checks before judgment" rule applied to CI itself.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      # 0. M-09: install the engine at the committed snapshot's own version — the wheel IS the
      #    release the snapshot was pinned from, so parity + snapshot-drift below are binding
      #    (`--require-engine`), not self-skipping.
      - uses: ./.github/actions/install-pinned-transon

      # 1. Requirement-ID consistency: no dead/deprecated IDs; done rows have a citing test.
      - name: Traceability
        run: python harness/scripts/check_traceability.py

      # 2. Broken-link check: every relative Markdown file/anchor link must resolve.
      - name: Markdown links
        run: python harness/scripts/check_links.py

      # 3. Harness golden-path evals: maker≠checker, cost-tiered routing, skill determinism, loop recipe.
      - name: Harness evals
        run: python harness/evals/run_evals.py

      # 3. Engine/spec drift — binding (M-09 flipped): the pinned wheel is installed above, so
      #    a parity failure is real drift, never an environment gap.
      - name: Engine parity
        run: python harness/scripts/check_engine_parity.py --require-engine

      # 4. Committed metadata snapshot drift — binding (M-09 flipped): the snapshot must be
      #    byte-identical to the pinned wheel's export.
      - name: Metadata snapshot
        run: python harness/scripts/update_memory.py --check --require-engine

      # 5. Agentic-maturity ratchet: fail if the harness regresses below the committed baseline.
      - name: Agentic maturity (ratchet)
        run: python harness/scripts/check_maturity.py --check

      # 6. No hand-written codec↔workspace mapping layer (FR-126, AD-032).
      - name: No codec↔workspace mapping
        run: python harness/scripts/check_no_codec_mapping.py

      # 7. Editor-owned presentation is data, not TS literals, and complete (FR-127, NFR-048).
      - name: Presentation projection-data (FR-127)
        run: python harness/scripts/check_presentation.py

      # 8. Blockly behavior runtime stays finite + rule-agnostic (NFR-046, AD-031).
      - name: Behavior runtime size (NFR-046)
        run: python harness/scripts/check_behavior_runtime_size.py

      # 9. Round-trip corpus covers every rule/variant in the metadata snapshot, with optional
      #    params exercised both ways (SPEC §15.8, FR-045/046) — the binding form of the
      #    "corpus case per touched rule/variant" review instruction.
      - name: Corpus coverage (SPEC §15.8)
        run: python harness/scripts/check_corpus_coverage.py

      # 10. Requirement IDs are append-only vs the committed docs/id-ledger.json — deletion or
      #     renumbering of any FR/NFR/AC/UC/AD/OQ fails; new IDs must be registered (SPEC §21.1).
      - name: Append-only requirement IDs (SPEC §21.1)
        run: python harness/scripts/check_append_only_ids.py

  # The full TypeScript workspace: typecheck + build + every vitest suite, including the
  # engine-executed adapter tests (the round-trip corpus runs against the real pinned engine).
  # Before this job existed the entire suite passed only on developer machines — CI stayed
  # green even if every test broke (AC-027 was local-only).
  tests:
    runs-on: ubuntu-latest
    # Surfaced at job level so the Codecov step's `if` can gate on it — a step's own `env` is not
    # reliably visible to that step's `if`, and `secrets` is never referenceable there directly.
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      # This job runs third-party install/build scripts (pnpm) — never leave the
      # repo token on disk for them.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      # The Node→Python adapter spawns `python3` and imports transon (AD-011); same
      # snapshot-derived pin as the gates job.
      - uses: ./.github/actions/install-pinned-transon

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0 — pnpm version comes from package.json "packageManager"

      # Matches the root engines ">=22": blockly@13 declares engines.node >=22 and
      # pnpm hard-fails install on the mismatch (first CI run proved it).
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      # Build everything first: some suites assert on their OWN package's dist output
      # (editor-react peer-not-bundled, editor-element no-engine IIFE), which turbo's
      # `test.dependsOn: ^build` alone would not produce.
      - name: Build
        run: pnpm build

      - name: Test with coverage
        run: pnpm run coverage

      # Upload coverage only when a CODECOV_TOKEN is configured (job-level env above); skip cleanly
      # until then so a not-yet-provisioned token can't red the whole tests job. When present the
      # upload stays strict (fail_ci_if_error).
      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@5a1091511ad55cbe89839c7260b706298ca349f7 # v5.5.1
        with:
          token: ${{ env.CODECOV_TOKEN }}
          fail_ci_if_error: true
