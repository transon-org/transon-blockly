name: agentic-checks

# Turns the repo's deterministic gates from advisory into binding: every PR and
# every push to main must pass the same checks an agent is told to run. This is
# the "deterministic checks before judgment" rule applied to CI itself.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 1. Requirement-ID consistency: no dead/deprecated IDs; done rows have a citing test.
      - name: Traceability
        run: python harness/scripts/check_traceability.py

      # 2. Broken-link check: every relative Markdown file/anchor link must resolve.
      - name: Markdown links
        run: python harness/scripts/check_links.py

      # 3. Harness golden-path evals: maker≠checker, cost-tiered routing, skill determinism, loop recipe.
      - name: Harness evals
        run: python harness/evals/run_evals.py

      # 3. Engine/spec drift. Self-skips today (the engine is not yet installable here). Once M0 lands,
      #    pin + `pip install transon` above and add `--require-engine` to make parity binding (M-09).
      - name: Engine parity
        run: python harness/scripts/check_engine_parity.py

      # 4. Committed metadata snapshot drift. Self-skips until the engine is pinned; add
      #    `--require-engine` alongside the parity flip at M-09 so the snapshot can't go stale.
      - name: Metadata snapshot
        run: python harness/scripts/update_memory.py --check

      # 5. Agentic-maturity ratchet: fail if the harness regresses below the committed baseline.
      - name: Agentic maturity (ratchet)
        run: python harness/scripts/check_maturity.py --check

      # 6. No hand-written codec↔workspace mapping layer (FR-126, AD-032).
      - name: No codec↔workspace mapping
        run: python harness/scripts/check_no_codec_mapping.py

      # 7. Editor-owned presentation is data, not TS literals, and complete (FR-127, NFR-048).
      - name: Presentation projection-data (FR-127)
        run: python harness/scripts/check_presentation.py

      # 8. Blockly behavior runtime stays finite + rule-agnostic (NFR-046, AD-031).
      - name: Behavior runtime size (NFR-046)
        run: python harness/scripts/check_behavior_runtime_size.py
